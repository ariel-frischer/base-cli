project: base-cli
versions:
    unreleased:
        added:
            - SKILL.md for AI agent integration
            - Installation instructions in README
    0.0.1:
        date: 2026-03-16
        added:
            - Initial project scaffolding
            - '`base-cli init` command to generate Go CLI projects'
